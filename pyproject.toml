[project]
name = "coercex"
version = "0.1.0"
description = "Async NTLM authentication coercion scanner and fuzzer"
requires-python = ">=3.11"
dependencies = [
    "impacket>=0.11.0",
]

[project.scripts]
coercex = "coercex.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coercex"]
